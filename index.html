<!DOCTYPE html>
<html>
<head>
    <title>ShieldGate Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-emerald-500 font-mono min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full border-2 border-emerald-900 p-8 rounded-lg shadow-[0_0_20px_rgba(16,185,129,0.2)]">
        <h1 class="text-2xl font-bold mb-2 uppercase tracking-tighter">ShieldGate Auditor v1.0</h1>
        <p class="text-emerald-800 text-xs mb-8 border-b border-emerald-900 pb-4 italic">Scanning for vulnerabilities...</p>

        <form method="POST" class="space-y-4">
            <input type="text" name="target" placeholder="Enter string to audit..." required
                   class="w-full bg-black border border-emerald-800 p-3 outline-none focus:border-emerald-400 text-emerald-400">
            <button class="w-full bg-emerald-900 hover:bg-emerald-700 text-black font-bold p-3 transition uppercase">
                Run Security Scan
            </button>
        </form>

        {% if results %}
        <div class="mt-8 pt-6 border-t border-emerald-900">
            <h2 class="text-sm uppercase text-emerald-700 mb-2">Audit Result:</h2>
            <div class="text-3xl font-black {% if results.rating == 'STRONG' %}text-emerald-400{% elif results.rating == 'MODERATE' %}text-yellow-500{% else %}text-red-600{% endif %}">
                {{ results.rating }}
            </div>
            
            <ul class="mt-4 space-y-2 text-xs">
                {% for item in results.feedback %}
                <li class="text-slate-400">{{ item }}</li>
                {% endfor %}
                {% if not results.feedback %}
                <li class="text-emerald-400">✅ All security protocols met.</li>
                {% endif %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
